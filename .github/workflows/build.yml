name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build

      - name: Publish
        run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./publish

      - name: Create Inno Setup Script
        run: |
          @"
          [Setup]
          AppName=ChatApp
          AppVersion=1.0.0
          DefaultDirName={autopf}\ChatApp
          OutputDir=.
          OutputBaseFilename=ChatApp-Setup
          Compression=lzma2
          [Files]
          Source: "publish\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs
          "@ | Out-File -FilePath setup.iss -Encoding utf8

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Installer
        run: iscc setup.iss

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: github.ref == 'refs/heads/master'
        with:
          files: ChatApp-Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
